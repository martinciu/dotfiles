# ─── Prefix ─────────────────────────────────
# C-a (screen-style) — C-Space conflicts with macOS input-source switching
# when multiple keyboard layouts are enabled.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Terminal ───────────────────────────────
# Prefer tmux-256color terminfo; fall back to screen-256color on stock macOS.
if-shell 'infocmp tmux-256color >/dev/null 2>&1' \
  'set -g default-terminal "tmux-256color"' \
  'set -g default-terminal "screen-256color"'
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-ghostty:hyperlinks"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-256color:hyperlinks"

# ─── General ────────────────────────────────
set -g mouse on  # URLs need Shift+Cmd+click in tmux — see README "Quirks"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on
set -g history-limit 50000

# When the last pane in a session exits (Ctrl-D, `exit`, kill-session),
# switch to the most-recently-used other session instead of detaching.
# Falls back to detach if no other session exists.
set -g detach-on-destroy off

# No bells anywhere — Ghostty/zsh/vim are also silenced; this kills tmux's
# own bell flag (#F) on the window status line.
set -g bell-action none
set -g visual-bell off
set -g monitor-bell off

# ─── Window naming ──────────────────────────
# allow-rename off: ignore OSC title escapes from apps (e.g. Claude Code,
# which sets the title to its version string).
# automatic-rename on: tmux drives the window name with three-tier precedence:
#   1. @claude_session_name (per-pane) → render `claude[<name>]`. Set by the
#      claude-tmux-window-name helper invoked from Claude Code's
#      SessionStart/Stop/SessionEnd hooks; cleared on SessionEnd.
#   2. @last_cmd (per-pane)            → render the last typed command. Set by
#      the zsh preexec hook (_tmux_record_last_cmd in .zshrc).
#   3. fallback                        → pane_current_command (typically `zsh`).
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format '#{?#{!=:#{@claude_session_name},},claude[#{@claude_session_name}],#{?#{==:#{@last_cmd},},#{pane_current_command},#{@last_cmd}}}'

# ─── Splits keep cwd, mirror Ghostty's bindings ──
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── New window: honor @session_root (set by `s`) ──
# `s` stamps @session_root with the worktree/project root on every invocation
# (incl. re-attach), so <prefix> c lands at the session root rather than
# inheriting pane cwd. Format mirrors tmux.conf:50 (the @claude_session_name
# emptiness test). Splits intentionally keep pane_current_path — house rule.
# Sessions not started by `s` have no @session_root → falls back to
# pane_current_path (tmux default behavior, no regression).
bind c new-window -c "#{?#{!=:#{@session_root},},#{@session_root},#{pane_current_path}}"

# ─── Vim-style pane nav (with prefix) ───────
# Alt is reserved for Polish diacritics (ą ć ę ł ń ó ś ź ż), so we use prefix.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Reload ─────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# ─── sesh popup ─────────────────────────────
# Picker height tracks the entry count (count + small buffer, clamped to a
# sane min and 80% of client height). Width stays at 70% to match the file
# and URL picker popups. Implementation: ~/.config/tmux/bin/tmux-sesh-picker.
# `run -b` (forked) matches the URL picker pattern — when a wrapper opens
# its own popup, tmux's event loop must not block on the wrapper itself.
# Don't wrap `sesh picker` in $(...); that captures stdout and breaks
# fzf's TUI rendering (popup opens, picker shows zero entries).
# Swap with the default <prefix> t (clock-mode): lowercase t is faster to
# reach for the picker we use constantly; uppercase T moves the clock.
bind-key "t" run -b "~/.config/tmux/bin/tmux-sesh-picker"
bind-key "T" clock-mode

# ─── File-link picker ───────────────────────
# Sibling of <prefix> u (URL picker): scans pane + 2k scrollback for paths,
# fzf-picks one, jumps the per-session nvim (or new window if none).
# Width (70%) matches the sesh and tmux-fzf-url popups; height stays at 70%
# because the file list is dynamic (whatever fzf finds in scrollback) and
# can be long. Sesh's height is computed dynamically by its wrapper.
bind-key "o" display-popup -E -w 70% -h 70% \
  "~/.config/tmux/bin/tmux-fzf-file '#{pane_id}' '#{pane_current_path}'"

# ─── Plugins (TPM) ──────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# tmux-fzf-url provides: xre binary (auto-installed regex extractor),
# the URL/Git/IP/GitHub-shorthand pattern set, fzf-tmux invocation, and
# the open_url dispatcher. We OWN the <prefix> u binding (override after
# the TPM run below) because xre dedups by FIRST appearance — for
# recurring URLs we want the LATEST occurrence to win positioning.
# See bin/tmux-fzf-url-newest. --tac in @fzf-url-fzf-options is
# intentional so the newest URL lands at the cursor.
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-fzf-options '-w 70% -h 70% --multi -0 --no-preview --border --tac'

run '~/.config/tmux/plugins/tpm/tpm'

# Override the plugin's <prefix> u binding (set during the TPM run above)
# with our wrapper. Must come AFTER `run '...tpm'` so we win the binding.
bind-key -N "Open URLs (full pane scrollback, newest occurrence wins)" u \
  run -b "~/.config/tmux/bin/tmux-fzf-url-newest 50000"

# ─── Status line (Solarized base16 + powerline) ──
# base03=#002b36 base02=#073642 base01=#586e75 base00=#657b83
# base0 =#839496 base1 =#93a1a1 base2 =#eee8d5 base3 =#fdf6e3
# yellow=#b58900 orange=#cb4b16 red   =#dc322f magenta=#d33682
# violet=#6c71c4 blue  =#268bd2 cyan  =#2aa198 green  =#859900

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#073642,fg=#839496"

# Left: session name on a blue chip
set -g status-left "#[fg=#fdf6e3,bg=#268bd2,bold]  #S #[fg=#268bd2,bg=#073642] "
set -g status-left-length 40

# Windows
setw -g window-status-format         "#[fg=#586e75,bg=#073642] #I:#W "
setw -g window-status-current-format "#[fg=#b58900,bg=#073642]#[fg=#073642,bg=#b58900,bold] #I:#W #[fg=#b58900,bg=#073642]"

# Right: project (violet) → git/worktree (script-driven, color varies)
set -g status-right "\
#[fg=#6c71c4,bg=#073642]\
#[fg=#fdf6e3,bg=#6c71c4,bold]  #(~/.config/tmux/bin/tmux-project-name #{pane_current_path}) \
#(~/.config/tmux/bin/tmux-git-status #{pane_current_path} '#6c71c4' '#073642')"
set -g status-right-length 80

# ─── Selection, messages, and pane borders ──
# Override tmux defaults that fall outside the Solarized palette.
set -g mode-style            "bg=#2aa198,fg=#002b36"  # mouse / copy-mode selection
set -g message-style         "bg=#2aa198,fg=#002b36"  # display notifications (e.g. "config reloaded")
set -g message-command-style "bg=#002b36,fg=#2aa198"  # prefix-: command prompt (inverted — preserves tmux's "input field" look)
set -g pane-border-style        "fg=#586e75"          # inactive pane border (base01)
set -g pane-active-border-style "fg=#268bd2"          # active pane border (Solarized blue)
