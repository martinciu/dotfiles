# ─── Prefix ─────────────────────────────────
# C-a (screen-style) — C-Space conflicts with macOS input-source switching
# when multiple keyboard layouts are enabled.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Terminal ───────────────────────────────
# Prefer tmux-256color terminfo; fall back to screen-256color on stock macOS.
if-shell 'infocmp tmux-256color >/dev/null 2>&1' \
  'set -g default-terminal "tmux-256color"' \
  'set -g default-terminal "screen-256color"'
set -ga terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB"

# ─── General ────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on
set -g history-limit 50000

# ─── Splits keep cwd, mirror Ghostty's bindings ──
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── Vim-style pane nav (with prefix) ───────
# Alt is reserved for Polish diacritics (ą ć ę ł ń ó ś ź ż), so we use prefix.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Reload ─────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# ─── sesh popup ─────────────────────────────
bind-key "T" display-popup -E -w 70% -h 70% \
  "sesh connect \"$(sesh list -i | fzf-tmux -p 70%,70% --reverse --no-sort --border-label ' sesh ')\""

# ─── Plugins (TPM) ──────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
run '~/.config/tmux/plugins/tpm/tpm'
